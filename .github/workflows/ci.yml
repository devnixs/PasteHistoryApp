name: Build macOS App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x64
            runner: macos-26-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build debug
        run: swift build

      - name: Package app bundle
        run: scripts/package_app.sh

      - name: Rename packaged zip for architecture
        run: mv dist/PasteHistoryApp-macOS.zip dist/PasteHistoryApp-macOS-${{ matrix.arch }}.zip

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: PasteHistoryApp-app-${{ matrix.arch }}
          path: dist/PasteHistoryApp.app
          if-no-files-found: error

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: PasteHistoryApp-zip-${{ matrix.arch }}
          path: dist/PasteHistoryApp-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error
